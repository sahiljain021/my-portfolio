<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error 404</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #5a0000, #8b0000, #ff3333);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 60px;
            border-radius: 20px;
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            animation: fadeIn 1.2s ease-in-out;
        }

        h1 {
            font-size: 5rem;
            margin-bottom: 10px;
        }

        h2 {
            font-size: 1.8rem;
            margin-bottom: 15px;
        }

        p {
            font-size: 1.1rem;
            opacity: 0.85;
            margin-bottom: 25px;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 30px;
            background: white;
            color: #8b0000;
            font-weight: 500;
            text-decoration: none;
            transition: 0.3s;
        }

        .btn:hover {
            background: #ffe5e5;
            transform: scale(1.05);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(25px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        footer {
            position: absolute;
            bottom: 15px;
            font-size: 0.85rem;
            opacity: 0.7;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>404</h1>
        <h2>Oops! Page Not Found 🚫</h2>
        <p>The page you are looking for doesn’t exist.</p>
        <a href="index.html" class="btn">Go Back Home</a>
    </div>

    <footer>
        © 2026 Sahil
    </footer>

</body>
</html>
